# https://redocly.com/docs/cli/configuration/
# Keep CI strict on schema integrity, but avoid style-level rollout blockers.
apis:
  main:
    root: openapi/openapi.yaml

rules:
  no-unresolved-refs: error
  tag-description: off
  # No global security scheme (same-origin + optional Turnstile session for search)
  security-defined: off
