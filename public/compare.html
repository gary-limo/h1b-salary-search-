<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FAFAF8;color:#1B2A4A;-webkit-font-smoothing:antialiased;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

nav{position:sticky;top:0;z-index:50;background:rgba(27,42,74,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(184,160,98,.2);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#B8A062;box-shadow:0 0 6px #B8A062;margin-right:0}
.nav-title{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.3px}
.nav-accent{color:#B8A062}
.nav-tagline{color:rgba(255,255,255,.6);font-size:12px;font-weight:400;letter-spacing:.2px}
.nav-link{color:#B8A062;text-decoration:none;font-weight:500}
.nav-link:hover{color:#fff;text-decoration:underline}
.nav-sep{color:rgba(255,255,255,.2);font-size:12px}

.hero{position:relative;background:linear-gradient(135deg,#1B2A4A 0%,#243560 50%,#1B2A4A 100%);padding:40px 24px 56px;overflow:visible}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:800;color:#fff;letter-spacing:-1px;line-height:1.1;margin-bottom:6px;text-align:center}
.hero h1 .accent{color:#B8A062;position:relative;display:inline-block}
.hero h1 .accent::after{content:"";position:absolute;bottom:-3px;left:0;right:0;height:2px;background:linear-gradient(90deg,#B8A062,transparent);border-radius:2px}
.hero-sub{text-align:center;color:rgba(255,255,255,.55);font-size:14px;margin-bottom:20px}

.picker-box{max-width:680px;margin:0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px}
.picker-search-wrap{position:relative}
.picker-input-wrap{position:relative;background:rgba(255,255,255,.95);border-radius:10px;border:1.5px solid transparent;transition:border .15s,box-shadow .15s}
.picker-input-wrap.focused{background:#fff;border-color:#B8A062;box-shadow:0 0 0 3px rgba(184,160,98,.2)}
.picker-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(27,42,74,.35);pointer-events:none;display:flex}
.picker-input-wrap.focused .picker-icon{color:#1B2A4A}
.picker-input{width:100%;height:42px;padding-left:34px;padding-right:10px;border:none;border-radius:10px;background:transparent;font-size:14px;color:#1B2A4A;outline:none;font-family:inherit}
.picker-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:300;background:#fff;border-radius:10px;border:1px solid #E2DDD6;box-shadow:0 8px 24px rgba(27,42,74,.12);display:none;max-height:240px;overflow-y:auto}
.picker-dropdown.open{display:block}
.picker-dd-item{padding:8px 14px;font-size:13px;color:#1B2A4A;cursor:pointer;transition:background .1s}
.picker-dd-item:hover,.picker-dd-item.highlighted{background:rgba(184,160,98,.08)}
.picker-dd-item+.picker-dd-item{border-top:1px solid #F0ECE8}
.picker-dd-loading{padding:10px 14px;font-size:12px;color:#9CA3AF;display:flex;align-items:center;gap:6px}
.picker-dd-empty{padding:10px 14px;font-size:12px;color:#9CA3AF}

.chips-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;min-height:0}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:13px;font-weight:600;color:#fff;animation:fadeUp .2s ease both}
.chip-remove{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:0;display:flex;align-items:center;transition:color .1s}
.chip-remove:hover{color:#fff}
.chip-limit{font-size:11px;color:rgba(255,255,255,.45);align-self:center}

.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-compare{flex:1;height:42px;background:#C41E3A;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s;letter-spacing:-.2px}
.btn-compare:hover{background:#A01830}
.btn-compare:disabled{background:#9B1629;cursor:not-allowed;opacity:.7}

.presets{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:14px;position:relative;z-index:1}
.presets-label{font-size:11px;color:rgba(255,255,255,.35);align-self:center;margin-right:2px}
.preset-btn{padding:6px 16px;border-radius:99px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;transition:all .15s}
.preset-btn:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(184,160,98,.4)}

.wave{position:absolute;bottom:-1px;left:0;right:0;pointer-events:none}

main{max-width:1100px;margin:0 auto;padding:28px 24px 40px;width:100%}

.dashboard{display:none}
.dashboard.show{display:block}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:#fff;border:1px solid #E2DDD6;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(27,42,74,.05);animation:fadeUp .25s ease both}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#8896A6;font-weight:600;margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:800;color:#1B2A4A;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:11px;color:#8896A6;margin-top:2px}

.section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:24px}
.section-bar{width:3px;height:18px;border-radius:2px;background:#B8A062;flex-shrink:0}
.section-title{font-size:16px;font-weight:800;letter-spacing:-.3px}

.chart-wrap{background:#fff;border:1px solid #E2DDD6;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(27,42,74,.05);margin-bottom:16px}
.chart-container{position:relative;width:100%;height:340px}

.tbl-wrap{background:#fff;border-radius:12px;border:1px solid #E2DDD6;overflow:hidden;box-shadow:0 1px 4px rgba(27,42,74,.05);margin-top:10px}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;white-space:nowrap}
thead tr{background:#1B2A4A}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:rgba(255,255,255,.85);letter-spacing:.4px;text-transform:uppercase}
tbody tr{transition:background .1s;animation:fadeUp .25s ease both}
tbody tr:hover{background:#F8F6F3}
tbody tr:nth-child(even){background:#FCFBF9}
tbody tr:nth-child(even):hover{background:#F8F6F3}
td{padding:10px 14px;font-size:13px;color:#1B2A4A;border-bottom:1px solid #F0ECE8}
tbody tr:last-child td{border-bottom:none}
td.level-cell{font-weight:700;white-space:nowrap;background:#FAFAF8}
td .wage-val{font-weight:700;font-variant-numeric:tabular-nums}
td.emp{white-space:normal;word-break:break-word}
td.job{white-space:normal;word-break:break-word;min-width:180px}
td.empty-cell{color:#C0C7CF;font-style:italic;font-size:12px}

.error-box{display:flex;align-items:flex-start;gap:10px;background:#FFF1F2;border:1px solid #FECDD3;border-radius:10px;padding:12px 14px;margin-top:12px;font-size:13px;color:#C41E3A}
.hidden{display:none!important}

.site-footer{text-align:center;padding:24px 16px 32px;font-size:12px;color:#8896A6}
.site-footer a{color:#B8A062;text-decoration:none;font-weight:500}
.site-footer a:hover{text-decoration:underline;color:#1B2A4A}
.footer-sep{margin:0 6px;color:#C0C7CF}

.disclaimer{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(184,160,98,.06);border:1px solid rgba(184,160,98,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#000;line-height:1.5;text-align:center;margin-top:24px}
.disclaimer strong{color:#000}

@media (max-width:640px){
  .hero{padding:28px 16px 40px}
  .hero h1{margin-bottom:4px}
  .picker-box{padding:10px;border-radius:14px}
  nav{padding:0 16px;height:48px}
  .nav-tagline{display:none}
  main{padding:16px 12px 32px}
  .kpi-row{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi-value{font-size:20px}
  .chart-container{height:260px}
  .presets{gap:4px}
  .section-title{font-size:15px}
}

@media (min-width:641px) and (max-width:1024px){
  main{max-width:100%;padding:20px 16px 32px}
  .kpi-row{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

<script>
var CAREER_LEVELS = [
  "L1 - Entry-Level",
  "L2 - Mid-Level",
  "L3 - Senior",
  "L4 - Expert",
  "L5 - Manager",
  "L6 - Senior Manager",
  "L7 - Executive"
];

var COMPANY_COLORS = ["#C41E3A", "#B8A062", "#1B2A4A", "#2D8F4E", "#7B4FC4"];

var PRESETS = {
  "Big Tech": [
    "Google LLC",
    "Microsoft Corporation",
    "Apple Inc",
    "Amazon.com Services LLC",
    "Meta Platforms Inc"
  ],
  "Consulting": [
    "Deloitte Consulting LLP",
    "Accenture LLP",
    "Ernst & Young U.S. LLP",
    "PwC US Consulting LLP",
    "KPMG LLP"
  ],
  "Finance": [
    "JPMorgan Chase & Co",
    "GOLDMAN SACHS & CO. LLC",
    "Morgan Stanley & Co. LLC",
    "Bank of America N.A",
    "Citibank N.A"
  ]
};

var MAX_EMPLOYERS = 5;
var selectedEmployers = [];
var suggestTimer = null;
var barChartInstance = null;
var lineChartInstance = null;
var highlightedIndex = -1;

var usdFmt = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });

function $(id) { return document.getElementById(id); }

function escHtml(s) {
  if (s == null) return "";
  var d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtUSD(v) {
  return v == null ? "\u2014" : usdFmt.format(v);
}

// ─── URL State ────────────────────────────────────────────────────────────────

function pushUrlState() {
  var params = new URLSearchParams();
  if (selectedEmployers.length > 0) {
    params.set("employers", selectedEmployers.join("||"));
  }
  var qs = params.toString();
  var url = window.location.pathname + (qs ? "?" + qs : "");
  window.history.replaceState(null, "", url);
}

function loadUrlState() {
  var params = new URLSearchParams(window.location.search);
  var raw = params.get("employers");
  if (!raw) return [];
  var names = raw.split("||").filter(function(n) { return n.trim() !== ""; });
  return names.slice(0, MAX_EMPLOYERS);
}

// ─── Chips ────────────────────────────────────────────────────────────────────

function renderChips() {
  var container = $("chipsRow");
  var html = "";
  for (var i = 0; i < selectedEmployers.length; i++) {
    var color = COMPANY_COLORS[i % COMPANY_COLORS.length];
    html += '<span class="chip" style="background:' + color + '">' +
      escHtml(selectedEmployers[i]) +
      '<button type="button" class="chip-remove" data-idx="' + i + '" aria-label="Remove">' +
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>' +
      '</button></span>';
  }
  if (selectedEmployers.length >= MAX_EMPLOYERS) {
    html += '<span class="chip-limit">Max ' + MAX_EMPLOYERS + ' employers</span>';
  }
  container.innerHTML = html;

  var removeBtns = container.querySelectorAll(".chip-remove");
  for (var j = 0; j < removeBtns.length; j++) {
    (function(btn) {
      btn.addEventListener("click", function() {
        var idx = parseInt(btn.getAttribute("data-idx"), 10);
        selectedEmployers.splice(idx, 1);
        renderChips();
        updateCompareBtn();
        pushUrlState();
      });
    })(removeBtns[j]);
  }
}

function addEmployer(name) {
  var trimmed = name.trim();
  if (!trimmed) return;
  for (var i = 0; i < selectedEmployers.length; i++) {
    if (selectedEmployers[i].toLowerCase() === trimmed.toLowerCase()) return;
  }
  if (selectedEmployers.length >= MAX_EMPLOYERS) return;
  selectedEmployers.push(trimmed);
  renderChips();
  updateCompareBtn();
  pushUrlState();
  $("empSearch").value = "";
  closeDropdown();
}

function updateCompareBtn() {
  $("compareBtn").disabled = selectedEmployers.length < 2;
}

// ─── Autocomplete ─────────────────────────────────────────────────────────────

function closeDropdown() {
  $("pickerDropdown").className = "picker-dropdown";
  $("pickerDropdown").innerHTML = "";
  highlightedIndex = -1;
}

function showDropdownLoading() {
  $("pickerDropdown").innerHTML = '<div class="picker-dd-loading">Searching...</div>';
  $("pickerDropdown").className = "picker-dropdown open";
  highlightedIndex = -1;
}

function showDropdownResults(results) {
  if (!results || results.length === 0) {
    $("pickerDropdown").innerHTML = '<div class="picker-dd-empty">No employers found</div>';
    $("pickerDropdown").className = "picker-dropdown open";
    highlightedIndex = -1;
    return;
  }
  var html = "";
  for (var i = 0; i < results.length; i++) {
    html += '<div class="picker-dd-item" data-name="' + escHtml(results[i]) + '">' + escHtml(results[i]) + '</div>';
  }
  $("pickerDropdown").innerHTML = html;
  $("pickerDropdown").className = "picker-dropdown open";
  highlightedIndex = -1;

  var items = $("pickerDropdown").querySelectorAll(".picker-dd-item");
  for (var j = 0; j < items.length; j++) {
    (function(item) {
      item.addEventListener("click", function() {
        addEmployer(item.getAttribute("data-name"));
      });
    })(items[j]);
  }
}

function highlightItem(idx) {
  var items = $("pickerDropdown").querySelectorAll(".picker-dd-item");
  if (items.length === 0) return;
  for (var i = 0; i < items.length; i++) {
    items[i].className = "picker-dd-item";
  }
  if (idx < 0) idx = items.length - 1;
  if (idx >= items.length) idx = 0;
  highlightedIndex = idx;
  items[idx].className = "picker-dd-item highlighted";
  items[idx].scrollIntoView({ block: "nearest" });
}

function fetchSuggestions(query) {
  var url = "/api/suggest?field=employer&q=" + encodeURIComponent(query);
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        showDropdownResults(data.results || []);
      } catch (e) {
        closeDropdown();
      }
    } else {
      closeDropdown();
    }
  };
  xhr.send();
}

$("empSearch").addEventListener("input", function() {
  var val = this.value.trim();
  clearTimeout(suggestTimer);
  if (val.length < 2) {
    closeDropdown();
    return;
  }
  showDropdownLoading();
  suggestTimer = setTimeout(function() {
    fetchSuggestions(val);
  }, 250);
});

$("empSearch").addEventListener("keydown", function(e) {
  var items = $("pickerDropdown").querySelectorAll(".picker-dd-item");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    highlightItem(highlightedIndex + 1);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    highlightItem(highlightedIndex - 1);
  } else if (e.key === "Enter") {
    e.preventDefault();
    if (highlightedIndex >= 0 && highlightedIndex < items.length) {
      addEmployer(items[highlightedIndex].getAttribute("data-name"));
    }
  } else if (e.key === "Escape") {
    closeDropdown();
  }
});

$("empSearch").addEventListener("focus", function() {
  $("pickerInputWrap").classList.add("focused");
});
$("empSearch").addEventListener("blur", function() {
  $("pickerInputWrap").classList.remove("focused");
  setTimeout(closeDropdown, 200);
});

document.addEventListener("click", function(e) {
  if (!e.target.closest(".picker-search-wrap")) {
    closeDropdown();
  }
});

// ─── Compare ──────────────────────────────────────────────────────────────────

function runCompare() {
  if (selectedEmployers.length < 2) return;

  $("compareBtn").disabled = true;
  $("compareBtnText").textContent = "Loading\u2026";
  $("errorBox").classList.add("hidden");
  $("dashboard").classList.remove("show");

  var url = "/api/compare?employers=" + encodeURIComponent(selectedEmployers.join("||"));
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    $("compareBtn").disabled = false;
    $("compareBtnText").textContent = "Compare Salaries";

    var body = xhr.responseText || "";
    var json = null;
    try {
      json = JSON.parse(body);
    } catch (e) { /* non-JSON response */ }

    if (xhr.status === 200) {
      if (json && Array.isArray(json.results)) {
        renderDashboard(json.results);
        return;
      }
      var preview = body.trim().slice(0, 120);
      if (preview) {
        showError("Unexpected API response. " + preview);
      } else {
        showError("Unexpected empty response from compare API.");
      }
      return;
    }

    var errMsg = "Request failed (" + xhr.status + ")";
    if (json && json.error) {
      errMsg = json.error;
    } else if (body.trim()) {
      errMsg = body.trim().slice(0, 160);
    }
    showError(errMsg);
  };
  xhr.send();
}

function showError(msg) {
  $("errorMsg").textContent = msg;
  $("errorBox").classList.remove("hidden");
}

$("compareBtn").addEventListener("click", function() {
  pushUrlState();
  runCompare();
});

// ─── Dashboard Rendering ──────────────────────────────────────────────────────

function buildPivot(results) {
  var employers = [];
  var seen = {};
  for (var i = 0; i < results.length; i++) {
    var name = results[i].employer_name;
    if (!seen[name]) {
      seen[name] = true;
      employers.push(name);
    }
  }

  var pivot = {};
  for (var l = 0; l < CAREER_LEVELS.length; l++) {
    pivot[CAREER_LEVELS[l]] = {};
  }

  for (var r = 0; r < results.length; r++) {
    var row = results[r];
    var level = row.std_career_level;
    if (pivot[level]) {
      pivot[level][row.employer_name] = {
        wage: row.avg_wage
      };
    }
  }

  return { employers: employers, pivot: pivot };
}

function computeKPIs(data, employers) {
  var totalAvgEntry = 0;
  var entryCount = 0;
  var highestAvg = 0;
  var highestLabel = "";
  var levelsSeen = {};

  for (var l = 0; l < CAREER_LEVELS.length; l++) {
    var level = CAREER_LEVELS[l];
    var levelRow = data[level];
    var hasData = false;
    for (var e = 0; e < employers.length; e++) {
      var cell = levelRow[employers[e]];
      if (cell && cell.wage != null) {
        hasData = true;
        if (level === "L1 - Entry-Level") {
          totalAvgEntry += cell.wage;
          entryCount++;
        }
        if (cell.wage > highestAvg) {
          highestAvg = cell.wage;
          highestLabel = level;
        }
      }
    }
    if (hasData) {
      levelsSeen[level] = true;
    }
  }

  var avgEntry = entryCount > 0 ? Math.round(totalAvgEntry / entryCount) : null;
  var levelsCount = Object.keys(levelsSeen).length;

  return {
    companyCount: employers.length,
    avgEntry: avgEntry,
    highestAvg: highestAvg,
    highestLabel: highestLabel,
    levelsCount: levelsCount
  };
}

function renderKPIs(kpis) {
  var cards = '';
  cards += '<div class="kpi-card">' +
    '<div class="kpi-label">Companies</div>' +
    '<div class="kpi-value">' + kpis.companyCount + '</div>' +
    '</div>';

  cards += '<div class="kpi-card">' +
    '<div class="kpi-label">Avg Entry Salary</div>' +
    '<div class="kpi-value">' + (kpis.avgEntry != null ? fmtUSD(kpis.avgEntry) : "\u2014") + '</div>' +
    '</div>';

  cards += '<div class="kpi-card">' +
    '<div class="kpi-label">Highest Average</div>' +
    '<div class="kpi-value">' + fmtUSD(kpis.highestAvg) + '</div>' +
    '<div class="kpi-sub">' + escHtml(kpis.highestLabel) + '</div>' +
    '</div>';

  cards += '<div class="kpi-card">' +
    '<div class="kpi-label">Career Levels</div>' +
    '<div class="kpi-value">' + kpis.levelsCount + '</div>' +
    '</div>';

  $("kpiRow").innerHTML = cards;
}

function renderBarChart(pivotData, employers) {
  if (typeof window.Chart === "undefined") return;
  if (barChartInstance) {
    barChartInstance.destroy();
    barChartInstance = null;
  }

  var datasets = [];
  for (var e = 0; e < employers.length; e++) {
    var empData = [];
    for (var l = 0; l < CAREER_LEVELS.length; l++) {
      var cell = pivotData[CAREER_LEVELS[l]][employers[e]];
      empData.push(cell ? cell.wage : null);
    }
    datasets.push({
      label: employers[e],
      data: empData,
      backgroundColor: COMPANY_COLORS[e % COMPANY_COLORS.length],
      borderRadius: 4,
      borderSkipped: false
    });
  }

  var ctx = $("barChart").getContext("2d");
  barChartInstance = new window.Chart(ctx, {
    type: "bar",
    data: {
      labels: CAREER_LEVELS,
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "top",
          labels: {
            usePointStyle: true,
            pointStyle: "circle",
            padding: 16,
            font: { size: 11, family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }
          }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              return ctx.dataset.label + ": " + (ctx.parsed.y != null ? usdFmt.format(ctx.parsed.y) : "N/A");
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            maxRotation: 45
          }
        },
        y: {
          beginAtZero: true,
          ticks: {
            callback: function(v) { return "$" + (v / 1000) + "k"; },
            font: { size: 11 }
          },
          grid: { color: "rgba(0,0,0,.05)" }
        }
      }
    }
  });
}

function renderLineChart(pivotData, employers) {
  if (typeof window.Chart === "undefined") return;
  if (lineChartInstance) {
    lineChartInstance.destroy();
    lineChartInstance = null;
  }

  var datasets = [];
  for (var e = 0; e < employers.length; e++) {
    var empData = [];
    for (var l = 0; l < CAREER_LEVELS.length; l++) {
      var cell = pivotData[CAREER_LEVELS[l]][employers[e]];
      empData.push(cell ? cell.wage : null);
    }
    var color = COMPANY_COLORS[e % COMPANY_COLORS.length];
    datasets.push({
      label: employers[e],
      data: empData,
      borderColor: color,
      backgroundColor: color + "22",
      tension: 0.3,
      pointRadius: 5,
      pointHoverRadius: 7,
      fill: false,
      spanGaps: true
    });
  }

  var ctx = $("lineChart").getContext("2d");
  lineChartInstance = new window.Chart(ctx, {
    type: "line",
    data: {
      labels: CAREER_LEVELS,
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "top",
          labels: {
            usePointStyle: true,
            pointStyle: "circle",
            padding: 16,
            font: { size: 11, family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }
          }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              return ctx.dataset.label + ": " + (ctx.parsed.y != null ? usdFmt.format(ctx.parsed.y) : "N/A");
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            maxRotation: 45
          }
        },
        y: {
          beginAtZero: true,
          ticks: {
            callback: function(v) { return "$" + (v / 1000) + "k"; },
            font: { size: 11 }
          },
          grid: { color: "rgba(0,0,0,.05)" }
        }
      }
    }
  });
}

function renderDashboard(results) {
  var built = buildPivot(results);
  var employers = built.employers;
  var pivotData = built.pivot;

  if (employers.length === 0) {
    showError("No comparison data returned. Try different employers.");
    return;
  }

  var kpis = computeKPIs(pivotData, employers);
  renderKPIs(kpis);
  renderBarChart(pivotData, employers);
  renderLineChart(pivotData, employers);
  $("dashboard").classList.add("show");
  $("dashboard").scrollIntoView({ behavior: "smooth", block: "start" });
}

// ─── Presets ──────────────────────────────────────────────────────────────────

var presetsContainer = document.querySelector(".presets");
var presetKeys = Object.keys(PRESETS);
for (var p = 0; p < presetKeys.length; p++) {
  (function(key) {
    var btn = document.createElement("button");
    btn.className = "preset-btn";
    btn.type = "button";
    btn.textContent = key;
    btn.addEventListener("click", function() {
      selectedEmployers = PRESETS[key].slice();
      renderChips();
      updateCompareBtn();
      pushUrlState();
      runCompare();
    });
    presetsContainer.appendChild(btn);
  })(presetKeys[p]);
}

// ─── Init from URL ────────────────────────────────────────────────────────────

(function init() {
  var fromUrl = loadUrlState();
  if (fromUrl.length > 0) {
    selectedEmployers = fromUrl;
    renderChips();
    updateCompareBtn();
    if (selectedEmployers.length >= 2) {
      runCompare();
    }
  }
})();
</script>
