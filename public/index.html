<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FB88SFVP3D"></script>
<script src="/js/gtag.js"></script>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>H1B Salary Search | H1b Visa Wages </title>
<meta name="description" content="Search H-1B visa salary records from the U.S. Department of Labor LCA disclosure data (FY2025). Find H1B wages by employer, job title, and location. Free, fast, open source.">
<meta name="keywords" content="H1B salary, H-1B visa wages, LCA salary data, H1B wages database, H-1B employer salaries, H1B job title salary, H1B visa compensation, LCA disclosure data, H1B search">
<meta name="author" content="H1BSearch">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://h1b-salaries.com/">

<meta property="og:type" content="website">
<meta property="og:title" content="H1B Salary Search">
<meta property="og:description" content="Find H1B wages by employer, job title, and location. Free & open source.">
<meta property="og:site_name" content="H1BSearch">
<meta property="og:locale" content="en_US">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "H1B Salary Search",
  "description": "H1B salary database. Find H1B wages by employer, job title, and location.",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "Any",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "creator": {
    "@type": "Organization",
    "name": "H1BSearch",
    "url": "https://github.com/gary-limo/h1b-salary-search-"
  },
  "about": {
    "@type": "Dataset",
    "name": "H-1B LCA Disclosure Data FY2025",
    "description": "Labor Condition Application (LCA) disclosure data published by the U.S. Department of Labor. Contains employer name, job title, base salary, and work location for H-1B visa petitions.",
    "creator": {
      "@type": "GovernmentOrganization",
      "name": "U.S. Department of Labor",
      "url": "https://www.dol.gov/"
    },
    "license": "https://www.usa.gov/government-works",
    "temporalCoverage": "2024/2025"
  },
  "keywords": ["H1B salary", "H-1B visa", "LCA data", "H1B wages", "H1B employer salary"]
}
</script>
<link rel="stylesheet" href="/css/index.css">
</head>
<body>
<a href="#searchForm" class="skip-link">Skip to search</a>
<nav aria-label="Main navigation">
  <div class="nav-dot"></div>
  <span class="nav-title">H1B<span class="nav-accent">Search</span></span>
  <span class="nav-tagline">Search H-1B wages by employer, job, location</span>
</nav>

<section class="hero" aria-label="Search">
  <div style="max-width:720px;margin:0 auto;text-align:center">
    <h1>Salary <span class="accent">Explorer</span></h1>

    <form id="searchForm" autocomplete="off" class="search-box" role="search" aria-label="Search H-1B salary records">
      <div class="search-grid">
        <div class="field-wrap">
          <div class="field-inner" id="empFieldInner">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></svg>
            </div>
            <input class="field-input" id="empInput" type="text" placeholder="Employer (e.g. Apple Inc)" aria-label="Employer" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="empDropdown">
          </div>
          <div class="dropdown" id="empDropdown" role="listbox"></div>
        </div>
        <div class="field-wrap">
          <div class="field-inner" id="jobFieldInner">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <input class="field-input" id="jobInput" type="text" placeholder="Job title" aria-label="Job title" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="jobDropdown">
          </div>
          <div class="dropdown" id="jobDropdown" role="listbox"></div>
        </div>
        <div class="field-wrap">
          <div class="field-inner" id="locFieldInner">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <input class="field-input" id="locInput" type="text" placeholder="Location (e.g. Seattle)" aria-label="Location" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="locDropdown">
          </div>
          <div class="dropdown" id="locDropdown" role="listbox"></div>
        </div>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-search" id="searchBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span id="searchBtnText">Search Salaries</span>
        </button>
        <button type="button" class="btn-clear" id="clearBtn" title="Clear" aria-label="Clear search fields">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="turnstile-widget" class="turnstile-host"></div>
    </form>

    <div class="popular">
      <span class="popular-label">Popular:</span>
    </div>
  </div>
  <div class="wave">
    <svg viewBox="0 0 1440 56" fill="none" aria-hidden="true"><path d="M0 56L60 49C120 42 240 28 360 22.3C480 17 600 20 720 25.7C840 31 960 39 1080 42C1200 45 1320 42 1380 40.7L1440 39V56H0Z" fill="#FAFAF8"/></svg>
  </div>
</section>

<main>
  <div class="results-wrap" id="resultsWrap">
    <div class="section-hdr">
      <div class="section-bar"></div>
      <div class="section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <h2>Search Results</h2>
      </div>
      <span class="badge" id="resultsBadge" aria-live="polite"></span>
    </div>
    <div id="errorBox" class="error-box hidden" role="alert" aria-live="assertive">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px" aria-hidden="true"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <span id="errorMsg"></span>
    </div>
    <div id="skeletonTable"></div>
    <div id="tableContainer" class="hidden" aria-live="polite" aria-relevant="additions text"></div>
    <div id="pagerContainer" class="pager hidden"></div>
  </div>

  <div class="disclaimer">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B8A062" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px" aria-hidden="true"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    <span><strong>Data source:</strong> U.S. Department of Labor H-1B LCA. Wages do not include benefits or bonuses. For reference only.</span>
  </div>
</main>

<footer class="site-footer">
  <a href="https://github.com/gary-limo/h1b-salary-search-" target="_blank" rel="noopener noreferrer">Open Source</a>
  <span class="footer-sep">&middot;</span>
  <span>Data from FY2025</span>
</footer>

<script src="/js/index.js"></script>
</body>
</html>
