<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://challenges.cloudflare.com">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Feedback</title>
<link rel="stylesheet" href="/css/index.css">
<link rel="stylesheet" href="/css/contact.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to form</a>
<nav aria-label="Main navigation">
  <div class="nav-dot"></div>
  <a href="/" class="nav-title" style="text-decoration:none;color:inherit">H1B<span class="nav-accent">Search</span></a>
  <div class="nav-links">
    <a href="/insights/" class="nav-link">Insights</a>
    <span class="nav-sep" aria-hidden="true">·</span>
    <a href="/employers/" class="nav-link">Employers</a>
  </div>
</nav>

<section class="hero" style="padding:28px 24px 40px">
  <div class="contact-main" id="main">
    <a href="/" class="contact-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
      Back
    </a>
    <h1 style="font-size:clamp(20px,3.8vw,30px);font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:16px;text-align:left;line-height:1.35">Looking for something else or have any suggestions ?</h1>

    <div class="contact-form" style="margin-top:8px">
      <form id="contactForm" data-post-url="/api/x/st" autocomplete="off" novalidate>
        <div class="contact-field">
          <label for="contactMessage">Message</label>
          <textarea id="contactMessage" name="message" required maxlength="8000" placeholder="Your message" aria-required="true"></textarea>
        </div>
        <div class="hp" aria-hidden="true">
          <label for="contactHp">Company website</label>
          <input type="text" id="contactHp" name="_company_website" tabindex="-1" autocomplete="off">
        </div>
        <div id="contactTurnstile" class="contact-turnstile"></div>
        <button type="submit" class="contact-submit" id="contactSubmit">Submit</button>
        <p id="contactStatus" class="contact-status" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>
  <div class="wave" aria-hidden="true">
    <svg viewBox="0 0 1440 56" fill="none"><path d="M0 56L60 49C120 42 240 28 360 22.3C480 17 600 20 720 25.7C840 31 960 39 1080 42C1200 45 1320 42 1380 40.7L1440 39V56H0Z" fill="#FAFAF8"/></svg>
  </div>
</section>

<footer class="site-footer">
  <a href="/">Home</a>
  <span class="footer-sep">&middot;</span>
  <a href="/insights/">Insights</a>
  <span class="footer-sep">&middot;</span>
  <a href="/employers/">Employers</a>
  <span class="footer-sep">&middot;</span>
  <a href="https://github.com/gary-limo/h1b-salary-search-" target="_blank" rel="noopener noreferrer">Open source</a>
</footer>

<script src="/js/contact.js"></script>
</body>
</html>
