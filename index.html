<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H1B Salary Search — Free & Open Source</title>
<meta name="description" content="Search H1B visa salary data from the U.S. Department of Labor. Free, fast, open source.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FAFAF8;color:#1B2A4A;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.skeleton{background:#E2DDD6;border-radius:6px;animation:pulse 1.5s ease infinite}

nav{position:sticky;top:0;z-index:50;background:rgba(27,42,74,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(196,163,90,.2);padding:0 24px;height:56px;display:flex;align-items:center}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#C4A35A;box-shadow:0 0 6px #C4A35A;margin-right:10px}
.nav-title{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.3px}
.nav-accent{color:#C4A35A}

.hero{position:relative;background:linear-gradient(135deg,#1B2A4A 0%,#243560 50%,#1B2A4A 100%);padding:72px 24px 100px;overflow:hidden}
.hero h1{font-size:clamp(32px,6vw,56px);font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1.1;margin-bottom:16px;text-align:center}
.hero h1 .accent{color:#C4A35A;position:relative;display:inline-block}
.hero h1 .accent::after{content:"";position:absolute;bottom:-4px;left:0;right:0;height:3px;background:linear-gradient(90deg,#C4A35A,transparent);border-radius:2px}

.search-box{max-width:680px;margin:0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:16px;backdrop-filter:blur(8px)}
.search-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px;position:relative;z-index:10}
.field-wrap{position:relative}
.field-inner{position:relative;background:rgba(255,255,255,.95);border-radius:12px;border:1.5px solid transparent;transition:border .15s,box-shadow .15s}
.field-inner.focused{background:#fff;border-color:#C4A35A;box-shadow:0 0 0 3px rgba(196,163,90,.2)}
.field-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(27,42,74,.35);pointer-events:none;transition:color .15s;display:flex}
.field-inner.focused .field-icon{color:#1B2A4A}
.field-input{width:100%;height:46px;padding-left:36px;padding-right:12px;border:none;border-radius:12px;background:transparent;font-size:14px;color:#1B2A4A;outline:none;font-family:inherit}
.dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:200;background:#fff;border-radius:12px;border:1px solid #E2DDD6;box-shadow:0 8px 24px rgba(27,42,74,.12);overflow:hidden;display:none}
.dropdown.open{display:block}
.dropdown-item{padding:10px 16px;font-size:13px;color:#1B2A4A;cursor:pointer;transition:background .1s}
.dropdown-item:hover{background:rgba(196,163,90,.08)}
.dropdown-item+.dropdown-item{border-top:1px solid #F0ECE8}
.dropdown-loading{padding:12px 16px;font-size:13px;color:#9CA3AF;display:flex;align-items:center;gap:8px}

.btn-row{display:flex;gap:8px;position:relative;z-index:1}
.btn-search{flex:1;height:50px;background:#C41E3A;color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;letter-spacing:-.2px}
.btn-search:hover{background:#A01830}
.btn-search:disabled{background:#9B1629;cursor:not-allowed}
.btn-clear{width:50px;height:50px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:rgba(255,255,255,.6);cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.btn-clear:hover{background:rgba(255,255,255,.18)}
.btn-clear.show{display:flex}

.popular{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:16px}
.popular-label{font-size:11px;color:rgba(255,255,255,.35);align-self:center;margin-right:2px}
.popular-btn{padding:4px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.55);font-size:12px;cursor:pointer;transition:all .15s}
.popular-btn:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(196,163,90,.4)}

.wave{position:absolute;bottom:-1px;left:0;right:0}

main{max-width:900px;margin:0 auto;padding:36px 24px 64px}
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.section-bar{width:4px;height:22px;border-radius:2px;background:#C4A35A;flex-shrink:0}
.section-title{font-size:18px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:7px}
.badge{margin-left:4px;padding:2px 10px;border-radius:99px;background:rgba(27,42,74,.07);color:#5A6478;font-size:12px;font-weight:600}

.results-wrap{margin-bottom:48px;display:none}
.results-wrap.show{display:block}
.tbl-wrap{background:#fff;border-radius:14px;border:1px solid #E2DDD6;overflow:hidden;box-shadow:0 1px 3px rgba(27,42,74,.06);margin-top:16px}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead tr{background:#1B2A4A;color:#fff;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
th{padding:14px 16px;text-align:left;white-space:nowrap}
tbody tr{transition:background .15s;animation:fadeUp .3s ease both}
tbody tr:hover{background:rgba(27,42,74,.02)}
td{padding:14px 16px;font-size:14px;color:#5A6478;border-bottom:1px solid #E2DDD6}
tbody tr:last-child td{border-bottom:none}
td.emp{font-weight:600;color:#1B2A4A}
td.salary{font-family:ui-monospace,monospace;font-weight:600;color:#1B2A4A}

.pager{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#fff;border-radius:12px;border:1px solid #E2DDD6}
.pager-info{font-size:13px;color:#5A6478}
.pager-btns{display:flex;align-items:center;gap:4px}
.pager-btn{padding:6px 10px;border-radius:8px;border:1px solid #E2DDD6;background:#fff;color:#1B2A4A;cursor:pointer;display:flex;align-items:center;font-size:13px;font-weight:600}
.pager-btn:disabled{background:#F5F5F4;color:#9CA3AF;cursor:not-allowed}
.pager-page{padding:0 8px;font-size:13px;color:#5A6478;font-weight:600}

.error-box{display:flex;align-items:flex-start;gap:10px;background:#FFF1F2;border:1px solid #FECDD3;border-radius:12px;padding:12px 16px;margin-top:16px;font-size:14px;color:#C41E3A}
.no-results{text-align:center;padding:48px 24px;color:#9CA3AF;font-size:15px}
.disclaimer{display:flex;align-items:flex-start;gap:10px;background:rgba(196,163,90,.06);border:1px solid rgba(196,163,90,.25);border-radius:12px;padding:12px 16px;font-size:13px;color:#5A6478;line-height:1.5}
.disclaimer strong{color:#1B2A4A}

.spinner{animation:spin 1s linear infinite}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-dot"></div>
  <span class="nav-title">H1B<span class="nav-accent">Search</span></span>
</nav>

<!-- HERO -->
<section class="hero">
  <div style="max-width:760px;margin:0 auto;text-align:center">
    <h1>H1B Salary <span class="accent">Explorer</span></h1>

    <form id="searchForm" autocomplete="off" class="search-box">
      <div class="search-grid">
        <!-- Employer -->
        <div class="field-wrap">
          <div class="field-inner" id="empFieldInner">
            <div class="field-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></svg>
            </div>
            <input class="field-input" id="empInput" type="text" placeholder="Employer name" aria-label="Employer" autocomplete="new-password">
          </div>
          <div class="dropdown" id="empDropdown"></div>
        </div>
        <!-- Job Title -->
        <div class="field-wrap">
          <div class="field-inner" id="jobFieldInner">
            <div class="field-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <input class="field-input" id="jobInput" type="text" placeholder="Job title" aria-label="Job title" autocomplete="new-password">
          </div>
          <div class="dropdown" id="jobDropdown"></div>
        </div>
        <!-- City -->
        <div class="field-wrap">
          <div class="field-inner" id="cityFieldInner">
            <div class="field-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <input class="field-input" id="cityInput" type="text" placeholder="Worksite city" aria-label="City" autocomplete="new-password">
          </div>
          <div class="dropdown" id="cityDropdown"></div>
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn-search" id="searchBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span id="searchBtnText">Search Salaries</span>
        </button>
        <button type="button" class="btn-clear" id="clearBtn" title="Clear">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
    </form>

    <div class="popular">
      <span class="popular-label">Popular:</span>
    </div>
  </div>

  <div class="wave">
    <svg viewBox="0 0 1440 56" fill="none"><path d="M0 56L60 49C120 42 240 28 360 22.3C480 17 600 20 720 25.7C840 31 960 39 1080 42C1200 45 1320 42 1380 40.7L1440 39V56H0Z" fill="#FAFAF8"/></svg>
  </div>
</section>

<!-- RESULTS -->
<main>
  <div class="results-wrap" id="resultsWrap">
    <div class="section-hdr">
      <div class="section-bar"></div>
      <div class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <h2>Search Results</h2>
      </div>
      <span class="badge" id="resultsBadge"></span>
    </div>

    <div id="errorBox" class="error-box hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <span id="errorMsg"></span>
    </div>
    <div id="skeletonTable"></div>
    <div id="noResults" class="no-results hidden">No records found. Try a different search.</div>
    <div id="tableContainer" class="hidden"></div>
    <div id="pagerContainer" class="pager hidden"></div>
  </div>

  <div class="disclaimer">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C4A35A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    <span><strong>Data source:</strong> U.S. Department of Labor H-1B LCA. Wages reported by employers may not reflect accurate compensation. For reference only.</span>
  </div>
</main>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
// After deploying the Amplify backend, run:
//   npx ampx generate outputs --branch main --app-id <YOUR_APP_ID>
// Then copy the url and api_key from amplify_outputs.json here.
const API_URL = "https://bytnax7zuzdnvnlladxamuo4qm.appsync-api.us-east-1.amazonaws.com/graphql";
const API_KEY = "da2-q2gpcpz7jfgkflhukjdgoniqfm";

const FIELDS = "id employerName jobTitle worksiteCity worksiteState wageRateOfPayFrom receivedDate beginDate";
const PAGE_SIZE = 10;

const POPULAR = [
  { label: "Google LLC",     employer: "Google LLC",            job: "",               city: "" },
  { label: "Amazon",         employer: "Amazon",                job: "",               city: "" },
  { label: "Microsoft",      employer: "Microsoft Corporation", job: "",               city: "" },
  { label: "Meta",           employer: "Meta Platforms",        job: "",               city: "" },
  { label: "Apple",          employer: "Apple Inc",             job: "",               city: "" },
  { label: "Accenture LLP",  employer: "Accenture LLP",        job: "",               city: "" },
  { label: "Data Scientist", employer: "",                      job: "Data Scientist", city: "" },
  { label: "San Francisco",  employer: "",                      job: "",               city: "San Francisco" },
  { label: "Seattle",        employer: "",                      job: "",               city: "Seattle" },
  { label: "New York",       employer: "",                      job: "",               city: "New York" },
];

// ─── STATE ──────────────────────────────────────────────────────────────────
let results = null;
let currentPage = 1;
let hasSearched = false;

// ─── DOM ────────────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const empInput = $("empInput"), jobInput = $("jobInput"), cityInput = $("cityInput");
const empDropdown = $("empDropdown"), jobDropdown = $("jobDropdown"), cityDropdown = $("cityDropdown");
const empFieldInner = $("empFieldInner"), jobFieldInner = $("jobFieldInner"), cityFieldInner = $("cityFieldInner");

// ─── GraphQL helper ─────────────────────────────────────────────────────────
async function gql(query, variables = {}) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
    body: JSON.stringify({ query, variables }),
  });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

// ─── Formatting ─────────────────────────────────────────────────────────────
function fmtUSD(val) {
  if (!val) return "\u2014";
  const n = parseFloat(val.replace(/[^0-9.-]/g, ""));
  if (isNaN(n)) return val;
  return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);
}

function fmtDate(val) {
  if (!val) return "\u2014";
  try {
    const d = new Date(val);
    if (isNaN(d.getTime())) return val;
    return `${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}-${d.getFullYear()}`;
  } catch { return val; }
}

// ─── Case variants for beginsWith (DynamoDB is case-sensitive) ──────────────
function caseVariants(s) {
  const v = [s, s.toLowerCase(), s.toUpperCase(),
    s.split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(" ")];
  return v.filter((x, i) => v.indexOf(x) === i);
}

// ─── Suggestions ────────────────────────────────────────────────────────────
async function fetchSuggestions(field, prefix) {
  const p = prefix.trim();
  if (!p) return [];
  const variants = caseVariants(p);
  const filters = variants.map(v => `{ ${field}: { beginsWith: "${v.replace(/"/g, '\\"')}" } }`).join(", ");
  const query = `query { listH1BS(limit: 50, filter: { or: [${filters}] }) { items { ${field} } } }`;
  const data = await gql(query);
  const items = (data.listH1BS?.items || []).map(r => r[field]).filter(Boolean);
  const seen = new Set();
  return items.filter(v => !seen.has(v) && seen.add(v)).slice(0, 8);
}

// ─── Search queries (using GSI query fields) ────────────────────────────────
function buildSearchQuery(e, j, c) {
  if (e && j && c) {
    return `query($e:String!,$j:ModelStringKeyConditionInput) {
      listH1BByEmployerNameAndJobTitle(employerName:$e, jobTitle:$j, limit:500) { items { ${FIELDS} } }
    }`;
  }
  if (e && j) {
    return `query($e:String!,$j:ModelStringKeyConditionInput) {
      listH1BByEmployerNameAndJobTitle(employerName:$e, jobTitle:$j, limit:500) { items { ${FIELDS} } }
    }`;
  }
  if (e && c) {
    return `query($e:String!,$c:ModelStringKeyConditionInput) {
      listH1BByEmployerNameAndWorksiteCity(employerName:$e, worksiteCity:$c, limit:500) { items { ${FIELDS} } }
    }`;
  }
  if (j && c) {
    return `query($j:String!,$c:ModelStringKeyConditionInput) {
      listH1BByJobTitleAndWorksiteCity(jobTitle:$j, worksiteCity:$c, limit:500) { items { ${FIELDS} } }
    }`;
  }
  if (e) return `query($e:String!) { listH1BByEmployerName(employerName:$e, limit:500) { items { ${FIELDS} } } }`;
  if (j) return `query($j:String!) { listH1BByJobTitle(jobTitle:$j, limit:500) { items { ${FIELDS} } } }`;
  if (c) return `query($c:String!) { listH1BByWorksiteCity(worksiteCity:$c, limit:500) { items { ${FIELDS} } } }`;
  return `query { listH1BS(limit:25) { items { ${FIELDS} } } }`;
}

function buildSearchVars(e, j, c) {
  const vars = {};
  if (e) vars.e = e;
  if (j) vars.j = (e || c) ? { eq: j } : j;
  if (c) vars.c = (e || j) ? { eq: c } : c;
  return vars;
}

function extractResults(data, city) {
  const key = Object.keys(data)[0];
  let items = (data[key]?.items || []).filter(Boolean);
  if (city && Object.keys(data)[0].includes("EmployerNameAndJobTitle")) {
    items = items.filter(r => (r.worksiteCity || "").toLowerCase() === city.toLowerCase());
  }
  return items;
}

async function doSearch(emp, job, cty) {
  const e = emp.trim(), j = job.trim(), c = cty.trim();
  const query = buildSearchQuery(e, j, c);
  const vars = buildSearchVars(e, j, c);
  const data = await gql(query, vars);
  return extractResults(data, (e && j && c) ? c : null);
}

// ─── Render ─────────────────────────────────────────────────────────────────
function renderTable(records) {
  if (!records.length) return "";
  const rows = records.map((r, i) => `
    <tr style="animation-delay:${i*30}ms">
      <td class="emp">${r.employerName || "\u2014"}</td>
      <td>${r.jobTitle || "\u2014"}</td>
      <td class="salary">${fmtUSD(r.wageRateOfPayFrom)}</td>
      <td>${[r.worksiteCity, r.worksiteState].filter(Boolean).join(", ") || "\u2014"}</td>
      <td style="white-space:nowrap">${fmtDate(r.receivedDate)}</td>
      <td style="white-space:nowrap">${fmtDate(r.beginDate)}</td>
    </tr>`).join("");
  return `<div class="tbl-wrap"><div class="tbl-scroll"><table>
    <thead><tr><th>Employer</th><th>Job Title</th><th>Base Salary</th><th>Location</th><th>Submit Date</th><th>Start Date</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function renderSkeleton() {
  const rows = Array.from({length:5}, (_,i) =>
    `<tr>${[140,90,100,90,90,90].map(w => `<td><div class="skeleton" style="height:15px;width:${w}px"></div></td>`).join("")}</tr>`
  ).join("");
  return `<div class="tbl-wrap"><div class="tbl-scroll"><table>
    <thead><tr><th>Employer</th><th>Job Title</th><th>Base Salary</th><th>Location</th><th>Submit Date</th><th>Start Date</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function renderPager() {
  if (!results || results.length <= PAGE_SIZE) { $("pagerContainer").classList.add("hidden"); return; }
  const total = Math.ceil(results.length / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, results.length);
  $("pagerContainer").classList.remove("hidden");
  $("pagerContainer").innerHTML = `
    <span class="pager-info">Showing ${start}\u2013${end} of ${results.length}</span>
    <div class="pager-btns">
      <button class="pager-btn" id="prevBtn" ${currentPage<=1?"disabled":""}>&#9664; Prev</button>
      <span class="pager-page">Page ${currentPage} of ${total}</span>
      <button class="pager-btn" id="nextBtn" ${currentPage>=total?"disabled":""}>Next &#9654;</button>
    </div>`;
  $("prevBtn").onclick = () => { if (currentPage > 1) { currentPage--; showPage(); } };
  $("nextBtn").onclick = () => { if (currentPage < total) { currentPage++; showPage(); } };
}

function showPage() {
  if (!results) return;
  const page = results.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  $("tableContainer").innerHTML = renderTable(page);
  $("tableContainer").classList.remove("hidden");
  renderPager();
}

function showResults() {
  const wrap = $("resultsWrap");
  wrap.classList.add("show");
  $("errorBox").classList.add("hidden");
  $("noResults").classList.add("hidden");
  $("skeletonTable").innerHTML = "";
  $("tableContainer").classList.add("hidden");
  $("pagerContainer").classList.add("hidden");

  if (!results) return;
  $("resultsBadge").textContent = `${results.length} record${results.length !== 1 ? "s" : ""}`;
  if (results.length === 0) { $("noResults").classList.remove("hidden"); return; }
  showPage();
}

// ─── Suggestion dropdown wiring ─────────────────────────────────────────────
function wireField(input, dropdown, fieldInner, fieldName) {
  let timer = null;
  input.addEventListener("focus", () => fieldInner.classList.add("focused"));
  input.addEventListener("blur", () => { fieldInner.classList.remove("focused"); setTimeout(() => { dropdown.classList.remove("open"); }, 200); });
  input.addEventListener("input", () => {
    clearTimeout(timer);
    const val = input.value.trim();
    if (val.length < 2 || hasSearched) { dropdown.classList.remove("open"); return; }
    dropdown.innerHTML = `<div class="dropdown-loading"><svg class="spinner" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Finding matches\u2026</div>`;
    dropdown.classList.add("open");
    timer = setTimeout(async () => {
      try {
        const items = await fetchSuggestions(fieldName, val);
        if (!items.length) { dropdown.classList.remove("open"); return; }
        dropdown.innerHTML = items.map(s => `<div class="dropdown-item">${s}</div>`).join("");
        dropdown.classList.add("open");
        dropdown.querySelectorAll(".dropdown-item").forEach(el => {
          el.addEventListener("mousedown", (e) => { e.preventDefault(); input.value = el.textContent; dropdown.classList.remove("open"); });
        });
      } catch { dropdown.classList.remove("open"); }
    }, 300);
  });
}

wireField(empInput, empDropdown, empFieldInner, "employerName");
wireField(jobInput, jobDropdown, jobFieldInner, "jobTitle");
wireField(cityInput, cityDropdown, cityFieldInner, "worksiteCity");

// ─── Search handler ─────────────────────────────────────────────────────────
$("searchForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("searchBtn"), txt = $("searchBtnText");
  hasSearched = true;
  btn.disabled = true;
  txt.textContent = "Searching\u2026";
  results = null;
  currentPage = 1;
  $("resultsWrap").classList.add("show");
  $("errorBox").classList.add("hidden");
  $("noResults").classList.add("hidden");
  $("tableContainer").classList.add("hidden");
  $("pagerContainer").classList.add("hidden");
  $("skeletonTable").innerHTML = renderSkeleton();
  $("resultsBadge").textContent = "";

  try {
    results = await doSearch(empInput.value, jobInput.value, cityInput.value);
    showResults();
    $("resultsWrap").scrollIntoView({ behavior: "smooth", block: "start" });
  } catch (err) {
    $("errorMsg").textContent = err.message || "Search failed.";
    $("errorBox").classList.remove("hidden");
    $("skeletonTable").innerHTML = "";
    results = [];
    $("resultsBadge").textContent = "0 records";
  } finally {
    btn.disabled = false;
    txt.textContent = "Search Salaries";
  }
});

// ─── Clear ──────────────────────────────────────────────────────────────────
function updateClearBtn() {
  const has = empInput.value.trim() || jobInput.value.trim() || cityInput.value.trim();
  $("clearBtn").classList.toggle("show", !!has);
}
[empInput, jobInput, cityInput].forEach(el => el.addEventListener("input", updateClearBtn));

$("clearBtn").addEventListener("click", () => {
  empInput.value = ""; jobInput.value = ""; cityInput.value = "";
  results = null; hasSearched = false; currentPage = 1;
  $("resultsWrap").classList.remove("show");
  updateClearBtn();
});

// ─── Popular tags ───────────────────────────────────────────────────────────
const popularContainer = document.querySelector(".popular");
POPULAR.forEach(item => {
  const btn = document.createElement("button");
  btn.className = "popular-btn";
  btn.type = "button";
  btn.textContent = item.label;
  btn.addEventListener("click", () => {
    empInput.value = item.employer;
    jobInput.value = item.job;
    cityInput.value = item.city;
    results = null; hasSearched = false;
    $("resultsWrap").classList.remove("show");
    updateClearBtn();
  });
  popularContainer.appendChild(btn);
});
</script>
