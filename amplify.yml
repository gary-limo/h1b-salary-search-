version: 1
backend:
  phases:
    build:
      commands:
        - export AMPLIFY_DISABLE_TELEMETRY=1
        - export CDK_DISABLE_NOTICES=1
        - export ALLOWED_ORIGINS=$AWS_BRANCH.$AWS_APP_ID.amplifyapp.com,localhost
        - npm ci --cache .npm --prefer-offline --legacy-peer-deps
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "Static site — no build needed"
  artifacts:
    baseDirectory: .
    files:
      - index.html
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
